config setup
    charondebug="ike 2, knl 2, cfg 2"
    uniqueids=no

conn %default
    ikelifetime=24h
    lifetime=8h
    rekey=yes
    dpdaction=clear
    dpddelay=30
    dpdtimeout=120

conn l2tp-vpn
    type=transport
    left=%any
    leftprotoport=17/1701
    right=%any
    rightprotoport=17/%any
    auto=add
    keyexchange=ikev1
    authby=secret
    ike=aes128-sha1-modp1024
    esp=aes128-sha1-modp1024
